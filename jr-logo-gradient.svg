<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title">
  <title>JR Logo</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a00"/>
      <stop offset="100%" stop-color="#00d1b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="320" height="320" rx="42" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="112" fill="rgba(6,10,18,0.22)"/>
  <g filter="url(#shadow)">
    <text x="160" y="188" text-anchor="middle" font-family="Bebas Neue, Arial, sans-serif" font-size="132" letter-spacing="6" fill="#ffffff">JR</text>
  </g>
</svg>
